name: Generate TestPlan Excel

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/generate_testplan_excel.yml'
      - 'tools/testplan_to_excel.py'
      - 'Test_Output/PCIE/testplan.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel from JSON
        env:
          JSON_PATH: Test_Output/PCIE/testplan.json
          OUTPUT_DIR: Test_Output/PCIE
        run: |
          python tools/testplan_to_excel.py

      - name: Commit generated Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ls Test_Output/PCIE/*.xlsx >/dev/null 2>&1; then
            git add Test_Output/PCIE/*.xlsx
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "Added generated TestPlan Excel"
              git push
            else
              echo "No changes to commit."
            fi
          else
            echo "No Excel files found to commit."
          fi
