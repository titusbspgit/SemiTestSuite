name: Generate TestPlan Excel

on:
  push:
    branches: ["main"]
    paths:
      - "scripts/gen_testplan_excel.py"
      - ".github/workflows/generate_testplan_excel.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel
        run: |
          python scripts/gen_testplan_excel.py

      - name: Commit and push generated Excel
        run: |
          git config user.name "Automation Bot"
          git config user.email "bot@noreply.com"
          git add Test_Output/GPIO/testplan_*.xlsx || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Added generated TestPlan Excel"
            git push
          fi
