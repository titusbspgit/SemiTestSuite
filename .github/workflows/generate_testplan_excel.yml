name: Generate GPIO TestPlan Excel

on:
  push:
    branches: [main]
    paths:
      - 'scripts/generate_testplan_excel.py'
      - 'Test_Output/GPIO/testplan_input.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel
        run: |
          python scripts/generate_testplan_excel.py \
            --input "Test_Output/GPIO/testplan_input.json" \
            --output-dir "Test_Output/GPIO"

      - name: Commit and push Excel
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FILE=$(ls -1t Test_Output/GPIO/testplan_*.xlsx 2>/dev/null | head -n 1 || true)
          if [ -n "$FILE" ]; then
            git add "$FILE"
            git commit -m "Added generated TestPlan Excel"
            git push origin HEAD:"$BRANCH_NAME"
          else
            echo "No Excel file generated."
            exit 1
          fi
