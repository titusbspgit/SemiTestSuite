name: Generate PCIE TestPlan Excel

on:
  push:
    branches: [ main ]
    paths:
      - 'Test_Output/PCIE/pcie_testplan_input.json'
      - 'tools/generate_testplan_excel.py'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel
        run: |
          python tools/generate_testplan_excel.py

      - name: Commit Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain Test_Output/PCIE/PCIE_TestPlan.xlsx)" ]; then
            git add Test_Output/PCIE/PCIE_TestPlan.xlsx
            git commit -m "chore(testplan): add PCIE_TestPlan.xlsx"
            git push
          else
            echo "No changes to commit."
          fi
