name: Generate GPIO TestPlan Excel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Write Test Plan input JSON
        shell: bash
        run: |
          cat > testplan_input.json << 'JSON'
          {
            "ip_name": "GPIO",
            "source_folders": [
              "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/gpio_reg_wr_rd_test",
              "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_nedge_alternate_pads_en",
              "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_negedge_intr_en",
              "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_pedge_all_pads_en",
              "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_pedge_alternate_pads_en"
            ],
            "generated_at": "2026-05-28T00:00:00Z",
            "testcases": [
              {
                "id": "gpio_reg_wr_rd_test",
                "name": "gpio_reg_wr_rd_test",
                "file_path": "TestRepo/gpio/gpio_reg_wr_rd_test",
                "source_github_url": "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/gpio_reg_wr_rd_test",
                "ip_name": "GPIO"
              },
              {
                "id": "test_gpio_nedge_alternate_pads_en",
                "name": "test_gpio_nedge_alternate_pads_en",
                "file_path": "TestRepo/gpio/test_gpio_nedge_alternate_pads_en",
                "source_github_url": "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_nedge_alternate_pads_en",
                "ip_name": "GPIO"
              },
              {
                "id": "test_gpio_negedge_intr_en",
                "name": "test_gpio_negedge_intr_en",
                "file_path": "TestRepo/gpio/test_gpio_negedge_intr_en",
                "source_github_url": "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_negedge_intr_en",
                "ip_name": "GPIO"
              },
              {
                "id": "test_gpio_pedge_all_pads_en",
                "name": "test_gpio_pedge_all_pads_en",
                "file_path": "TestRepo/gpio/test_gpio_pedge_all_pads_en",
                "source_github_url": "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_pedge_all_pads_en",
                "ip_name": "GPIO"
              },
              {
                "id": "test_gpio_pedge_alternate_pads_en",
                "name": "test_gpio_pedge_alternate_pads_en",
                "file_path": "TestRepo/gpio/test_gpio_pedge_alternate_pads_en",
                "source_github_url": "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_pedge_alternate_pads_en",
                "ip_name": "GPIO"
              }
            ]
          }
          JSON

      - name: Generate Excel from JSON
        run: |
          python scripts/generate_testplan_excel.py

      - name: Commit and push Excel
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Test_Output/GPIO/TestPlan.xlsx
          if ! git diff --cached --quiet; then
            git commit -m "Add GPIO TestPlan.xlsx generated from TestRepo/gpio"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
