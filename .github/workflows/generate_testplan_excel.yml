name: Generate TestPlan Excel (PCIE)

on:
  workflow_dispatch:
  push:
    paths:
      - 'Test_Output/PCIE/PCIE_TestPlan.json'
      - 'scripts/generate_testplan_excel.py'
      - '.github/workflows/generate_testplan_excel.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel from JSON
        run: |
          python scripts/generate_testplan_excel.py \
            --input Test_Output/PCIE/PCIE_TestPlan.json \
            --outdir Test_Output/PCIE \
            --sheet PCIE_TestPlan

      - name: Commit Excel artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Test_Output/PCIE/testplan_*.xlsx || true
          if git diff --cached --quiet; then
            echo "No Excel changes to commit."
          else
            git commit -m "Added generated TestPlan Excel"
            git push
          fi
