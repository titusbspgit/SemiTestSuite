name: Generate and Commit TestPlan Excel

on:
  push:
    branches: [ main ]
    paths:
      - 'data/testplan.json'
      - 'scripts/generate_testplan_excel.py'
      - '.github/workflows/generate_testplan_excel.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl
      - name: Generate Excel
        run: |
          python scripts/generate_testplan_excel.py
      - name: Commit generated Excel
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Test_Output/GPIO/testplan_*.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Added generated TestPlan Excel"
            git push
          fi
