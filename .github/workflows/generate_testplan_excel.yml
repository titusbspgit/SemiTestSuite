name: Generate TestPlan Excel

on:
  workflow_dispatch:
  push:
    paths:
      - Test_Output/PCIE/testplan.json

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel from JSON
        run: |
          python tools/convert_json_to_excel.py Test_Output/PCIE/testplan.json

      - name: Commit Excel artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          XLSX=$(ls -t Test_Output/PCIE/testplan_*.xlsx | head -n 1)
          if [ -z "$XLSX" ]; then
            echo "No Excel generated" >&2
            exit 1
          fi
          git add "$XLSX"
          git commit -m "Added generated TestPlan Excel" || echo "No changes to commit"
          git push
