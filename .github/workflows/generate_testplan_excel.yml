name: Generate and Commit TestPlan Excel

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install pandas openpyxl
      - name: Generate Excel
        run: |
          python scripts/generate_testplan_excel.py --json-path data/testplan.json --output-dir "Test_Output/GPIO"
      - name: Commit Excel
        run: |
          set -e
          OUTDIR="Test_Output/GPIO"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ls "$OUTDIR"/testplan_*.xlsx >/dev/null 2>&1; then
            git add "$OUTDIR"/testplan_*.xlsx
            if ! git diff --cached --quiet; then
              git commit -m "Added generated TestPlan Excel"
              git push
            else
              echo "No Excel changes to commit"
            fi
          else
            echo "No Excel generated"
            exit 1
          fi
