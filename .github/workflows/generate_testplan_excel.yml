name: Generate GPIO TestPlan Excel

on:
  workflow_dispatch:
  push:
    paths:
      - 'Test_Output/GPIO/testplan_data.json'
      - 'scripts/generate_testplan_excel.py'
      - '.github/workflows/generate_testplan_excel.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pytz

      - name: Generate Excel from JSON
        run: |
          python scripts/generate_testplan_excel.py

      - name: Try direct commit to main
        id: commit
        uses: EndBug/add-and-commit@v9
        continue-on-error: true
        with:
          add: 'Test_Output/GPIO/*.xlsx'
          message: 'Added generated TestPlan Excel'
          author_name: 'Ag-Emb-Testsuite-Excel-Generator Agent'
          author_email: 'actions@github.com'

      - name: Create Pull Request (fallback)
        if: steps.commit.outcome == 'failure'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Added generated TestPlan Excel'
          branch: autogen/testplan-gpio
          base: main
          title: 'Add autogenerated TestPlan (GPIO)'
          body: |
            Auto-generated GPIO TestPlan Excel from JSON using CI fallback.
            If direct push to main was blocked, this PR provides the artifact.
          add-paths: |
            Test_Output/GPIO/*.xlsx
