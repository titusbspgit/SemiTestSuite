name: Generate TestPlan Excel (GPIO)

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/generate_testplan_excel.yml"
      - "tools/generate_testplan_excel.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl
      - name: Write testplan_input.json from provided data
        run: |
          cat > testplan_input.json << 'JSON'
          {
            "ip_name": "GPIO",
            "testcases": [
              {
                "index": 1,
                "folder_name": "gpio_reg_wr_rd_test",
                "github_url": "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/gpio_reg_wr_rd_test",
                "raw_base_url": "https://raw.githubusercontent.com/titusbspgit/SemiTestSuite/main/TestRepo/gpio/gpio_reg_wr_rd_test/",
                "test_name": "gpio_reg_wr_rd_test",
                "objective": "Verify basic GPIO register write/read functionality and data integrity across accessible GPIO registers."
              },
              {
                "index": 2,
                "folder_name": "test_gpio_nedge_alternate_pads_en",
                "github_url": "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_nedge_alternate_pads_en",
                "raw_base_url": "https://raw.githubusercontent.com/titusbspgit/SemiTestSuite/main/TestRepo/gpio/test_gpio_nedge_alternate_pads_en/",
                "test_name": "test_gpio_nedge_alternate_pads_en",
                "objective": "Validate negative-edge interrupt detection with alternate GPIO pads enabled (every other pad), ensuring only enabled pads trigger."
              },
              {
                "index": 3,
                "folder_name": "test_gpio_negedge_intr_en",
                "github_url": "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_negedge_intr_en",
                "raw_base_url": "https://raw.githubusercontent.com/titusbspgit/SemiTestSuite/main/TestRepo/gpio/test_gpio_negedge_intr_en/",
                "test_name": "test_gpio_negedge_intr_en",
                "objective": "Enable and verify GPIO negative-edge interrupts, confirming correct trigger, status, and clear/handling behavior."
              },
              {
                "index": 4,
                "folder_name": "test_gpio_pedge_all_pads_en",
                "github_url": "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_pedge_all_pads_en",
                "raw_base_url": "https://raw.githubusercontent.com/titusbspgit/SemiTestSuite/main/TestRepo/gpio/test_gpio_pedge_all_pads_en/",
                "test_name": "test_gpio_pedge_all_pads_en",
                "objective": "Validate positive-edge interrupt detection with all GPIO pads enabled, ensuring triggers occur on any pad rising edge."
              },
              {
                "index": 5,
                "folder_name": "test_gpio_pedge_alternate_pads_en",
                "github_url": "https://github.com/titusbspgit/SemiTestSuite/tree/main/TestRepo/gpio/test_gpio_pedge_alternate_pads_en",
                "raw_base_url": "https://raw.githubusercontent.com/titusbspgit/SemiTestSuite/main/TestRepo/gpio/test_gpio_pedge_alternate_pads_en/",
                "test_name": "test_gpio_pedge_alternate_pads_en",
                "objective": "Validate positive-edge interrupt detection with alternate GPIO pads enabled, ensuring only enabled pads generate interrupts."
              }
            ]
          }
          JSON
      - name: Generate Excel
        run: |
          python tools/generate_testplan_excel.py --input testplan_input.json --output-dir "Test_Output/GPIO"
      - name: Commit Excel to repository
        run: |
          set -e
          NEW_FILE="$(ls -t Test_Output/GPIO/testplan_*.xlsx | head -n 1)"
          echo "Generated file: $NEW_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$NEW_FILE"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Added generated TestPlan Excel"
            git push origin HEAD:main
          fi
