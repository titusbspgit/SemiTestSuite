name: Generate TestPlan Excel

on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/generate_testplan_excel.py'
      - 'Test_Output/GPIO/testplan_input.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel
        run: |
          python tools/generate_testplan_excel.py Test_Output/GPIO/testplan_input.json Test_Output/GPIO

      - name: Commit Excel
        uses: EndBug/add-and-commit@v9
        with:
          add: 'Test_Output/GPIO/*.xlsx'
          message: 'Added generated TestPlan Excel'
