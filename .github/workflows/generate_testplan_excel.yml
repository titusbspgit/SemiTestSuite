name: Generate and Commit TestPlan Excel

on:
  workflow_dispatch:
  push:
    paths:
      - 'TestRepo/gpio/Test_Input/testplan.json'
      - 'TestRepo/gpio/tools/generate_testplan_excel.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Compute IST timestamp
        run: |
          echo "TS=$(TZ=Asia/Kolkata date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      - name: Generate Excel from JSON
        run: |
          python TestRepo/gpio/tools/generate_testplan_excel.py \
            --input TestRepo/gpio/Test_Input/testplan.json \
            --output-dir TestRepo/gpio/Test_Output/GPIO \
            --timestamp "$TS"

      - name: Commit and push generated Excel
        run: |
          set -e
          FILE="TestRepo/gpio/Test_Output/GPIO/testplan_${TS}.xlsx"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Added generated TestPlan Excel"
            git push origin HEAD:main
          fi
