name: Generate GPIO TestPlan Excel

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'Test_Output/GPIO/testplan_data.json'
      - 'scripts/generate_testplan_excel.py'
      - '.github/workflows/generate_testplan_excel.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set timezone to IST
        run: |
          sudo timedatectl set-timezone Asia/Kolkata || echo "Unable to set system timezone; using TZ env"
          echo "TZ=Asia/Kolkata" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel
        run: |
          python scripts/generate_testplan_excel.py --json Test_Output/GPIO/testplan_data.json --outdir Test_Output/GPIO --sheet TestPlan

      - name: Commit Excel
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Added generated TestPlan Excel"
          file_pattern: "Test_Output/GPIO/testplan_*.xlsx"
