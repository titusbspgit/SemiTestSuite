name: Generate GPIO TestPlan Excel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel from JSON
        run: |
          python scripts/generate_gpio_testplan.py

      - name: Commit and push generated Excel
        run: |
          git config user.name "Ag-Emb-Testsuite-Excel-Generator Agent"
          git config user.email "actions@github.com"
          git add Test_Output/GPIO/GPIO_TestPlan.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: add autogenerated GPIO_TestPlan.xlsx for IP GPIO"
            git push origin main
          fi
