name: Generate GPIO TestPlan Excel

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/generate_gpio_testplan.py'
      - '.github/workflows/generate_gpio_testplan.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl
      - name: Generate Excel
        run: |
          python scripts/generate_gpio_testplan.py
      - name: Commit generated Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain Test_Output/GPIO/GPIO_TestPlan.xlsx)" ]; then
            git add Test_Output/GPIO/GPIO_TestPlan.xlsx
            git commit -m "chore: regenerate autogenerated GPIO_TestPlan.xlsx"
            git push
          else
            echo "No changes to commit."
