name: Generate GPIO TestPlan Excel

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/generate_gpio_testplan.py
      - .github/workflows/generate_gpio_testplan.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl
      - name: Generate Excel
        run: |
          python scripts/generate_gpio_testplan.py
      - name: Commit and push Excel
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add Test_Output/GPIO/GPIO_TestPlan.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GPIO_TestPlan.xlsx generated from TestRepo/gpio (automated)"
            git push origin HEAD:main
          fi
