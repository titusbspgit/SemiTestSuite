name: Generate TestPlan Excel

on:
  workflow_dispatch:
    inputs:
      json_data:
        description: 'Final aggregated Test Plan JSON (array of objects)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Write JSON input to file
        env:
          INPUT_JSON_DATA: ${{ inputs.json_data }}
        run: |
          python - <<'PY'
          import os
          raw = os.environ.get('INPUT_JSON_DATA', '')
          with open('testplan.json', 'w', encoding='utf-8') as f:
              f.write(raw)
          print('Wrote testplan.json (bytes):', len(raw))
          PY

      - name: Generate Excel
        run: |
          python scripts/generate_testplan_excel.py --input testplan.json --output-dir 'Test_Output/GPIO'

      - name: Commit Excel
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'Test_Output/GPIO'/*.xlsx || true
          if git diff --cached --quiet; then
            echo "No new Excel generated to commit."
          else
            git commit -m "Added generated TestPlan Excel"
            git push origin main
          fi
