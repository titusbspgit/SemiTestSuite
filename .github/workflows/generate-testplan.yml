name: Generate PCIE TestPlan Excel

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/generate_testplan_xlsx.py'
      - 'Test_Output/PCIE/testplan_input.json'
      - '.github/workflows/generate-testplan.yml'

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl tzdata

      - name: Generate Excel
        run: |
          python scripts/generate_testplan_xlsx.py

      - name: Commit Excel artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Test_Output/PCIE/testplan_*.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add PCIE TestPlan Excel (auto-generated)"
          git push
