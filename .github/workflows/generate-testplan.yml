name: Generate TestPlan Excel (PCIE)

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/testplans/PCIE_testplan.json'
      - 'scripts/generate_testplan_excel.py'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pytz
      - name: Generate Excel from JSON
        run: |
          python scripts/generate_testplan_excel.py data/testplans/PCIE_testplan.json
      - name: Commit Excel to repository
        run: |
          git config user.name "Automation Bot"
          git config user.email "automation-bot@users.noreply.github.com"
          if ls Test_Output/PCIE/testplan_*.xlsx 1> /dev/null 2>&1; then
            git add Test_Output/PCIE/testplan_*.xlsx
            git commit -m "Added generated TestPlan Excel [skip ci]" || echo "Nothing to commit"
            git push
          else
            echo "No Excel files generated."
          fi
