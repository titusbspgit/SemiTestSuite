name: Generate PCIE TestPlan Excel

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/generate_testplan_xlsx.py'
      - 'Test_Output/PCIE/testplan_input.json'
      - '.github/workflows/generate-testplan.yml'

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl tzdata

      - name: Generate Excel
        run: |
          python scripts/generate_testplan_xlsx.py

      - name: Create stable filename copy
        run: |
          latest=$(ls -t Test_Output/PCIE/testplan_*.xlsx | head -n1 || true)
          if [ -z "$latest" ]; then
            echo "No generated XLSX found"; exit 1; fi
          cp "$latest" Test_Output/PCIE/TestPlan_PCIE.xlsx

      - name: Commit Excel artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Test_Output/PCIE/testplan_*.xlsx Test_Output/PCIE/TestPlan_PCIE.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add PCIE TestPlan Excel (auto-generated)"
          git push
