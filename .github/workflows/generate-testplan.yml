name: Generate TestPlan Excel

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/testplan.json'
      - 'scripts/generate_testplan_xlsx.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pytz

      - name: Generate Excel
        run: |
          python scripts/generate_testplan_xlsx.py --json data/testplan.json --outdir 'Test_Output/GPIO'

      - name: Commit generated Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'Test_Output/GPIO/'*.xlsx || true
          git commit -m "Added generated TestPlan Excel" || echo "No changes to commit"
          git push origin HEAD:main
