name: Generate GPIO TestPlan Excel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate formatted TestPlan Excel (GPIO)
        run: |
          python tools/testplan/generate_excel.py \
            --json-path ".github/testdata/GPIO_TestPlan.json" \
            --output-dir "Test_Output/GPIO/TestPlan" \
            --ip-name "GPIO"

      - name: Commit and push Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add Test_Output/GPIO/TestPlan/*.xlsx
            git commit -m "Final formatted Excel generated from JSON input"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
