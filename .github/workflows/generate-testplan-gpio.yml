name: Generate and Commit GPIO TestPlan Excel

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/generate_testplan_gpio.py'
      - '.github/workflows/generate-testplan-gpio.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel
        run: |
          python scripts/generate_testplan_gpio.py

      - name: Commit Excel output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Test_Output/GPIO/TestPlan.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add TestPlan.xlsx generated from GPIO test suites"
            git push origin HEAD:main
          fi
