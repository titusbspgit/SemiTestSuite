name: Generate GPIO TestPlan Excel

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'data/testplan_gpio.json'
      - 'scripts/generate_gpio_testplan_excel.py'
      - '.github/workflows/generate_gpio_testplan_excel.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel
        run: |
          python scripts/generate_gpio_testplan_excel.py \
            --input data/testplan_gpio.json \
            --sheet "GPIO-TestPlan" \
            --out "Test_Output/GPIO/TestPlan.xlsx"

      - name: Commit Excel
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "Test_Output/GPIO/TestPlan.xlsx"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: add generated GPIO TestPlan.xlsx"
            git push origin HEAD:main
          fi
