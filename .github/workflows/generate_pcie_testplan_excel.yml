name: Generate PCIE TestPlan Excel

on:
  push:
    paths:
      - 'scripts/generate_pcie_testplan_excel.py'
      - '.github/workflows/generate_pcie_testplan_excel.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel
        run: |
          python scripts/generate_pcie_testplan_excel.py

      - name: Commit and push Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Test_Output/PCIE/PCIE_TestPlan.xlsx
          if ! git diff --cached --quiet; then
            git commit -m "Add PCIE TestPlan Excel generated from GitHub tests"
            git push
          else
            echo "No changes to commit"
          fi
