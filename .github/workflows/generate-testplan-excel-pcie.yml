name: Generate TestPlan Excel (PCIE)

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/generate-testplan-excel-pcie.yml"
      - ".github/scripts/generate_testplan_excel_pcie.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, 'Added generated TestPlan Excel') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl
      - name: Generate Excel
        run: |
          python .github/scripts/generate_testplan_excel_pcie.py
      - name: Commit Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Test_Output/PCIE/testplan_*.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Added generated TestPlan Excel"
          git push
