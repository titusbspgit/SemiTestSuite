name: Generate TestPlan Excel

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'Test_Output/GPIO/testplan_input.json'
      - 'scripts/generate_testplan.py'
      - '.github/workflows/generate_testplan.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel from JSON
        id: generate
        run: |
          python scripts/generate_testplan.py

      - name: Commit Excel artifact
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Test_Output/GPIO/testplan_*.xlsx || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Added generated TestPlan Excel"
            git push
          fi
