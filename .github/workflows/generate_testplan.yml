name: Generate GPIO TestPlan Excel

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'scripts/generate_testplan.py'
      - '.github/workflows/generate_testplan.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate Excel
        run: |
          python scripts/generate_testplan.py

      - name: Commit and push Excel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Test_Output/GPIO/GPIO_TestPlan.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GPIO TestPlan Excel generated from extracted testcases (TestRepo/gpio on main)"
            git push origin HEAD:main
          fi
