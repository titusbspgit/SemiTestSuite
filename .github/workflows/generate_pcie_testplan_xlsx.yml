name: Generate PCIE TestPlan Excel
on:
  workflow_dispatch:
    inputs:
      json_inline:
        description: 'Test Plan JSON array (paste the array)'
        required: true
        type: string
      output_directory:
        description: 'Directory to write Excel'
        required: false
        default: Test_Output/PCIE
        type: string
      output_filename:
        description: 'Excel filename (optional). If empty, a timestamped name will be used.'
        required: false
        default: ''
        type: string
      commit_message:
        description: 'Commit message'
        required: false
        default: chore: add autogenerated PCIE TestPlan.xlsx
        type: string
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install openpyxl
      - name: Compute filename
        id: names
        shell: bash
        run: |
          IST_TS=$(TZ=Asia/Kolkata date +"%Y%m%d_%H%M%S")
          if [ -n "${{ inputs.output_filename }}" ]; then
            FNAME="${{ inputs.output_filename }}"
          else
            FNAME="testplan_${IST_TS}.xlsx"
          fi
          echo "fname=$FNAME" >> $GITHUB_OUTPUT
      - name: Generate Excel
        env:
          JSON_DATA: ${{ inputs.json_inline }}
          OUTPUT_PATH: ${{ github.workspace }}/${{ inputs.output_directory }}/${{ steps.names.outputs.fname }}
        run: |
          mkdir -p "${{ github.workspace }}/${{ inputs.output_directory }}"
          python scripts/generate_testplan_xlsx.py
      - name: Commit and push Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.output_directory }}/${{ steps.names.outputs.fname }}"
          git commit -m "${{ inputs.commit_message }}" || echo "No changes to commit"
          git push origin HEAD:main
